<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Create your account</title> 
<link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="stage">

  <div class="intro">
    <div>
      <div class="mark"> Create a New Account</div>
      <h1 class="headline">Three fields and you're in.</h1>
      <p class="sub">No verification emails, no waiting. Fill in your details and your account is ready the moment you submit.</p>
    </div>

    <div class="checklist" id="checklist">
      <div class="check-row" data-for="first">
        <div class="dot"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#123" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        First name
      </div>
      <div class="check-row" data-for="last">
        <div class="dot"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#123" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        Last name
      </div>
      <div class="check-row" data-for="email">
        <div class="dot"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#123" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        Valid email
      </div>
      <div class="check-row" data-for="password">
        <div class="dot"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#123" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        Password, 4+ characters
      </div>
    </div>
  </div>

  <div class="form-panel">
    <form id="signupForm" novalidate>
      <div class="field">
        <label for="first">First name</label>
        <input id="first" name="first" type="text" placeholder="Nick" autocomplete="given-name">
      </div>

      <div class="field">
        <label for="last">Last name</label>
        <input id="last" name="last" type="text" placeholder="Jonas" autocomplete="family-name">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="nick@example.com" autocomplete="email">
        <div class="hint" id="emailHint"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password" placeholder="At least 4 characters" autocomplete="new-password">
          <button type="button" class="toggle-pass" id="togglePass">Show</button>
        </div>
      </div>

      <button type="submit" class="submit" id="submitBtn">Create account</button>
      <div class="status" id="status"></div>
    </form>
  </div>

</div>

<script src="/script.js"></script>

</body> 
</html>
